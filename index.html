<!DOCTYPE html>
<html lang="en">
<head>
  <title>Attendance System</title>  
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="../assets/css/style.css">

  <!-- LIB -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  </head>

<body>

<!-- SIDEBAR -->
<nav class="pcoded-navbar menu-light">
  <div class="navbar-wrapper">
    <div class="navbar-content scroll-div">

      <div class="main-menu-header">
        <img class="img-radius" src="../assets/img/logo.png">
        <div class="user-details">
          <div>Attendance System</div>
        </div>
      </div>

      <ul class="nav pcoded-inner-navbar">
        <li class="nav-item">
          <a href="#" class="nav-link active" onclick="showPage('dashboard')">Dashboard</a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" onclick="showPage('scan')">Scan</a>
        </li>
      </ul>

    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="pcoded-main-container">
  <div class="pcoded-content">

    <!-- ================= DASHBOARD ================= -->
    <div id="dashboardPage">

      <h4>Dashboard Attendance</h4>

      <div class="row">
        <div class="col-md-4"><div class="card"><div class="card-body">
          <h6>Total Scan</h6>
          <h2 id="totalScan">0</h2>
        </div></div></div>

        <div class="col-md-4"><div class="card"><div class="card-body">
          <h6>Login (IN)</h6>
          <h2 id="totalIn">0</h2>
        </div></div></div>

        <div class="col-md-4"><div class="card"><div class="card-body">
          <h6>Logout (OUT)</h6>
          <h2 id="totalOut">0</h2>
        </div></div></div>
      </div>

      <div class="card mt-3">
        <div class="card-body">
          <table class="table">
            <thead>
              <tr>
                <th>NIS</th>
                <th>Nama</th>
                <th>Kelas</th>
                <th>Waktu</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="attendanceTable"></tbody>
          </table>
        </div>
      </div>

    </div>

    <!-- ================= SCAN ================= -->
    <div id="scanPage" style="display:none;">

      <h4>Scan Attendance</h4>

      <!-- MODE -->
      <label><input type="radio" name="mode" value="AUTO" checked> AUTO</label>
      <label><input type="radio" name="mode" value="IN"> IN</label>
      <label><input type="radio" name="mode" value="OUT"> OUT</label>

      <!-- CAMERA -->
      <select id="cameraSelect" class="form-control mt-2"></select>

      <div id="reader" style="width:300px; margin-top:10px;"></div>

      <div id="result" class="mt-3"></div>

    </div>

  </div>
</div>


<script>
// ================= SUPABASE =================
const supabaseClient = supabase.createClient(
  "assets/js/supabaseClient.js",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9leXF1cXZmZmlwaWFrb3plemp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NTY3NDYsImV4cCI6MjA5MDIzMjc0Nn0.gxsjF5reAM3egojoXGb6J8dqjQook4JiykjGG9-FWn4"
);

// ================= NAVIGATION =================
function showPage(page) {
  document.getElementById("dashboardPage").style.display = "none";
  document.getElementById("scanPage").style.display = "none";

  document.querySelectorAll(".nav-link").forEach(el => el.classList.remove("active"));

  if (page === "dashboard") {
    document.getElementById("dashboardPage").style.display = "block";
    document.querySelectorAll(".nav-link")[0].classList.add("active");
  } else {
    document.getElementById("scanPage").style.display = "block";
    document.querySelectorAll(".nav-link")[1].classList.add("active");
    startScanner();
  }
}

// ================= LOAD DATA =================
async function loadData() {
  const { data } = await supabaseClient
    .from("attendance")
    .select("*")
    .order("time", { ascending: false });

  const table = document.getElementById("attendanceTable");
  table.innerHTML = "";

  let total = 0, totalIn = 0, totalOut = 0;

  data.forEach(row => {
    total++;
    if (row.status === "IN") totalIn++;
    else totalOut++;

    table.innerHTML += `
      <tr>
        <td>${row.nis}</td>
        <td>${row.name}</td>
        <td>${row.kelas}</td>
        <td>${new Date(row.time).toLocaleString()}</td>
        <td>${row.status}</td>
      </tr>
    `;
  });

  document.getElementById("totalScan").innerText = total;
  document.getElementById("totalIn").innerText = totalIn;
  document.getElementById("totalOut").innerText = totalOut;
}

// ================= REALTIME =================
supabaseClient
  .channel('attendance')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'attendance' },
    () => loadData()
  )
  .subscribe();

// ================= SCANNER =================
let html5QrCode;
let lastScan = null;
let scannerStarted = false;

function getMode() {
  return document.querySelector('input[name="mode"]:checked').value;
}

async function determineStatus(nis) {
  const { data } = await supabaseClient
    .from("attendance")
    .select("*")
    .eq("nis", nis)
    .order("time", { ascending: false })
    .limit(1);

  if (!data.length) return "IN";

  const last = data[0];
  const diff = (new Date() - new Date(last.time)) / 60000;

  if (last.status === "IN" && diff < 60) {
    document.getElementById("result").innerHTML =
      `❌ Tunggu ${Math.ceil(60 - diff)} menit`;
    return null;
  }

  return last.status === "IN" ? "OUT" : "IN";
}

async function getStudent(nis) {
  const { data } = await supabaseClient
    .from("students")
    .select("*")
    .eq("nis", nis)
    .single();

  return data;
}

async function saveAttendance(nis, name, kelas, status) {
  await supabaseClient.from("attendance").insert([
    { nis, name, kelas, status }
  ]);
}

async function onScanSuccess(decodedText) {

  if (decodedText === lastScan) return;
  lastScan = decodedText;
  setTimeout(() => lastScan = null, 3000);

  const resultEl = document.getElementById("result");
  resultEl.innerHTML = "⏳ Processing...";

  const student = await getStudent(decodedText);

  if (!student) {
    resultEl.innerHTML = "❌ Tidak terdaftar";
    return;
  }

  let status;
  const mode = getMode();

  if (mode === "AUTO") {
    status = await determineStatus(decodedText);
    if (!status) return;
  } else {
    status = mode;
  }

  const now = new Date().toLocaleString("id-ID");

  resultEl.innerHTML = `
    <b>${student.name}</b><br>
    ${status}<br>
    ${now}
  `;

  await saveAttendance(decodedText, student.name, student.kelas, status);
}

// ================= CAMERA =================
function startScanner() {
  if (scannerStarted) return;

  const cameraSelect = document.getElementById("cameraSelect");
  const reader = document.getElementById("reader");

  if (!cameraSelect || !reader) return;

  scannerStarted = true;

  Html5Qrcode.getCameras().then(devices => {

    cameraSelect.innerHTML = "";

    devices.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d.id;
      opt.text = d.label || "Camera";
      cameraSelect.appendChild(opt);
    });

    html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
      devices[0].id,
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );

    cameraSelect.onchange = () => {
      html5QrCode.stop().then(() => {
        html5QrCode.start(
          cameraSelect.value,
          { fps: 10, qrbox: 250 },
          onScanSuccess
        );
      });
    };
  });
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", () => {
  loadData();
});
</script>

</body>
</html>
