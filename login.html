<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">  
  <!-- LIB -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<div class="login-container">

  <div class="login-card">

    <div class="text-center mb-3">
      <img src="assets/img/logo3.png" style="max-height:70px;">
      <h5 class="mt-2">Admin Login</h5>
      <small class="text-muted">Attendance System</small>
    </div>

    <!-- EMAIL -->
    <div class="mb-3">
      <label>Email</label>
      <input type="email" id="email" class="form-control" placeholder="Masukkan email">
    </div>

    <!-- PASSWORD -->
    <div class="mb-3">
      <label>Password</label>
      <input type="password" id="password" class="form-control" placeholder="Masukkan password">
    </div>

    <!-- BUTTON -->
    <button class="btn btn-secondary w-100 rounded-pill" onclick="login()">
      Login
    </button>

    <!-- ERROR -->
    <div id="errorMsg" class="text-danger text-center mt-3"></div>

    <!-- BACK -->
    <div class="text-center mt-3">
          <p class="mb-2 text-muted">Forgot password? <a href="" class="f-w-400">Reset</a></p>
          <p class="mb-0 text-muted">Don’t have an account? <a href="" class="f-w-400">Signup</a></p>
    </div>

  </div>

</div>



<!-- JS -->
<script src="assets/js/supabaseClient.js"></script>
<script src="assets/js/login.js"></script>

</body>
</html>
